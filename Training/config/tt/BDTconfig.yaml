Setup:
  input_path: '/vols/cms/lcr119/offline/HiggsCP/data/prod_feb/ShuffleMerge/tt'
  model_outputs: 'XGB_Models/prod_feb/tt'
  model_dir_name: 'model_tt'

param: {
        'objective': 'multi:softmax',
        'n_estimators': 205,
        'lambda': 5.584535832964484e-06,
        'subsample': 0.8403339927715867,
        'colsample_bytree': 0.5121890197474144,
        'learning_rate': 0.0627473964975825,
        'max_depth': 7,
        'min_child_weight': 8
      }

Features:
  train: ['pt_1', 'pt_2',  # individual kinematics
          'met_pt','met_dphi_1', 'met_dphi_2', # met information
          'dR', 'dphi', 'pt_tt', 'm_vis', 'pt_vis', 'FastMTT_mass', # pair quantities
          'mt_1', 'mt_2', 'mt_lep', 'mt_tot', # transverse masses
          'jpt_1', 'jpt_2', 'jeta_1', 'jeta_2', # individual jets
          'mjj', 'jdeta', 'dijetpt', # dijet quantities
          'n_jets'] # global jet information
  weight: 'class_weight'
  truth: 'class_label'
